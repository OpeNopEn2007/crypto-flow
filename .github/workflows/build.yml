name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact_name: CryptoFlow-macOS-arm64
            cmake_args: '-DCMAKE_OSX_ARCHITECTURES=arm64'
          - os: windows-latest
            artifact_name: CryptoFlow-Windows-x64
            cmake_args: '-G "Visual Studio 17 2022" -A x64'
          - os: ubuntu-22.04
            artifact_name: CryptoFlow-Linux-x64
            cmake_args: ''

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.3'
          target: desktop
          archives: 'qtbase'

      - name: Configure (macOS/Linux)
        if: runner.os != 'Windows'
        run: cmake -B build -DCMAKE_PREFIX_PATH=$QT_ROOT_DIR ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -DCMAKE_PREFIX_PATH=$env:QT_ROOT_DIR ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config Release

      # ── macOS: create .app bundle + DMG ──
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist/CryptoFlow.app/Contents/MacOS
          mkdir -p dist/CryptoFlow.app/Contents/Resources
          cp build/CryptoFlow dist/CryptoFlow.app/Contents/MacOS/
          cp resources/style.qss dist/CryptoFlow.app/Contents/Resources/
          cat > dist/CryptoFlow.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key><string>CryptoFlow</string>
            <key>CFBundleDisplayName</key><string>CryptoFlow</string>
            <key>CFBundleIdentifier</key><string>com.openenopEn.cryptoflow</string>
            <key>CFBundleVersion</key><string>1.0.0</string>
            <key>CFBundleShortVersionString</key><string>1.0.0</string>
            <key>CFBundleExecutable</key><string>CryptoFlow</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST
          # Bundle Qt frameworks
          macdeployqt dist/CryptoFlow.app -qmldir=. 2>/dev/null || true
          # Create DMG
          hdiutil create -volname CryptoFlow -srcfolder dist -ov -format UDZO CryptoFlow-macOS-arm64.dmg

      # ── Windows: windeployqt ──
      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy build\Release\CryptoFlow.exe dist\
          copy resources\style.qss dist\
          windeployqt dist\CryptoFlow.exe
          Compress-Archive -Path dist\* -DestinationPath CryptoFlow-Windows-x64.zip

      # ── Linux: linuxdeployqt ──
      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist/usr/bin dist/usr/share/applications dist/usr/share/icons
          cp build/CryptoFlow dist/usr/bin/
          cp resources/style.qss dist/usr/share/
          cat > dist/usr/share/applications/cryptoflow.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=CryptoFlow
          Exec=CryptoFlow
          Icon=cryptoflow
          Categories=Education;
          EOF
          # Download linuxdeployqt
          wget -q https://github.com/probonopd/linuxdeployqt/releases/download/continuous/linuxdeployqt-continuous-x86_64.AppImage -O linuxdeployqt
          chmod +x linuxdeployqt
          ./linuxdeployqt dist/usr/bin/CryptoFlow -appimage -qmldir=. 2>/dev/null || true
          mv CryptoFlow*.AppImage CryptoFlow-Linux-x64.AppImage

      # ── Upload artifacts ──
      - name: Upload (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: CryptoFlow-macOS-arm64.dmg

      - name: Upload (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: CryptoFlow-Windows-x64.zip

      - name: Upload (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: CryptoFlow-Linux-x64.AppImage

  # ── Create GitHub Release on tag push ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/CryptoFlow-macOS-arm64/*
            artifacts/CryptoFlow-Windows-x64/*
            artifacts/CryptoFlow-Linux-x64/*
